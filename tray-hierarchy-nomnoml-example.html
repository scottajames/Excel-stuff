<html>
<head>
    <title>Tray Hierarchy Nomnoml Example</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.17.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nomnoml/1.1.3/nomnoml.min.js"></script>
</head>
<body>
    <h1>Upload Excel file to build hierarchy</h1>
    <input type="file" id="file" accept=".xlsx" />
    <button id="generate">Generate Hierarchy</button>
    <div id="output"></div>

    <script>
        document.getElementById('generate').onclick = function() {
            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                const headers = jsonData[0];
                // Prepare to build hierarchy
                const hierarchy = {};
                for (let i = 1; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    const node = {};
                    headers.forEach((header, index) => {
                        node[header] = row[index];
                    });
                    buildHierarchy(hierarchy, node);
                }
                renderNomnoml(hierarchy);
            };
            reader.readAsArrayBuffer(file);
        }

        function buildHierarchy(hierarchy, node) {
            // Add logic to build the hierarchy here
        }

        function renderNomnoml(hierarchy) {
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = ''; // Clear previous diagrams
            const diagram = nomnoml.render('[[<parent tray> | <child trays>]]');
            outputDiv.appendChild(diagram);
        }
    </script>
</body>
</html>
